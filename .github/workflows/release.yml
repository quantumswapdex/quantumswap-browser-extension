name: Release

# Builds the Chrome Web Store zip whenever a version tag (e.g. v1.2.6) is
# pushed, then attaches it to a GitHub Release and uploads it as a workflow
# artifact.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check tag matches package.json version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION" >&2
            exit 1
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Build Chrome Web Store zip
        run: npm run zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-web-store-zip
          path: .output/*-chrome.zip
          if-no-files-found: error

      - name: Attach zip to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: ".output/*-chrome.zip"
